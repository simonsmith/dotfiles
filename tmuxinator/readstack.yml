name: readstack
root: ~/Sites/readstack
startup_window: nvim

windows:
  - nvim: nvim
  - dev:
      layout: even-horizontal
      panes:
        - gs
        -
  - laravel:
      root: ~/Sites/readstack/web
      layout: tiled
      panes:
        - XDEBUG_MODE=debug XDEBUG_TRIGGER=1 php artisan queue:work
        - XDEBUG_MODE=debug XDEBUG_TRIGGER=1 php artisan serve
        - pnpm run dev
        - pnpm run stripe-webhook
  - parser:
      root: ~/Sites/readstack/parser-service
      panes:
        - pnpm run dev:debug
